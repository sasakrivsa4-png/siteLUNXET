<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stylist - LUNXET MART</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { 
            --main: #cdef2e; 
            --dark: #0e0e10; 
            --gray: rgba(26, 26, 26, 0.8);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--dark);
            font-family: 'Inter', sans-serif; color: #fff;
            overflow-x: hidden;
        }

        #bg-canvas-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        .dot-grid__canvas { width: 100%; height: 100%; display: block; }

        .container { 
            max-width: 600px; margin: 80px auto 40px auto; /* Трохи більше відступ зверху */
            position: relative; z-index: 1; padding: 20px;
        }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--main); text-transform: uppercase; letter-spacing: 2px; }

        .section { 
            background: var(--gray); padding: 20px; border-radius: 20px; 
            margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
        }

        h3 { margin-top: 0; color: var(--main); font-size: 14px; text-transform: uppercase; margin-bottom: 15px; }

        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select { 
            background: #222; border: 1px solid #444; color: #fff; padding: 12px; 
            border-radius: 10px; outline: none; width: 100%; box-sizing: border-box;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-card { 
            background: #222; padding: 12px; border-radius: 12px; cursor: pointer; 
            display: flex; align-items: center; gap: 10px; border: 1px solid transparent; 
        }

        .btn-gen { 
            background: var(--main); color: #000; border: none; width: 100%; 
            padding: 20px; border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer;
            transition: 0.3s;
        }
        .btn-gen:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(205, 239, 46, 0.4); }

        /* Кнопка повернення зліва зверху */
        .btn-back {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            display: flex; align-items: center; gap: 8px;
            text-decoration: none; background: rgba(0,0,0,0.5); color: #fff;
            padding: 10px 15px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            font-size: 12px; font-weight: 600; text-transform: uppercase;
            transition: 0.3s; backdrop-filter: blur(5px);
        }
        .btn-back:hover { background: rgba(205, 239, 46, 0.1); border-color: var(--main); color: var(--main); }

        #result-area { display: none; margin-top: 30px; animation: fadeIn 0.5s; }
        .ai-image { width: 100%; border-radius: 20px; border: 2px solid var(--main); margin-bottom: 20px; }
        .info-box { background: #fff; color: #000; padding: 20px; border-radius: 15px; text-align: left; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<a href="/" class="btn-back">
    <i class="fas fa-chevron-left"></i> ПОВЕРНУТИСЯ
</a>

<div id="bg-canvas-container">
    <canvas class="dot-grid__canvas" id="dotCanvas"></canvas>
</div>

<div class="container">
    <div class="header">
        <h1>LUNXET AI</h1>
        <p>Персональний підбір образу</p>
    </div>

    <div class="section">
        <h3>1. Твої дані</h3>
        <div class="input-group">
            <select id="gender">
                <option value="female">Жінка</option>
                <option value="male">Чоловік</option>
            </select>
            <input type="number" id="height" placeholder="Зріст (см)">
            <select id="hair">
                <option value="blonde">Блонд</option>
                <option value="brunette">Брюнет</option>
                <option value="black">Чорний</option>
                <option value="red">Рудий</option>
            </select>
            <select id="style">
                <option value="casual">Casual</option>
                <option value="streetwear">Streetwear</option>
                <option value="formal">Formal</option>
                <option value="sporty">Sporty</option>
            </select>
        </div>
    </div>

    <div class="section">
        <h3>2. Що шукаємо?</h3>
        <div class="options-grid">
            <label class="opt-card">
                <input type="radio" name="outfit_type" value="full outfit" checked> Повний образ
            </label>
            <label class="opt-card">
                <input type="radio" name="outfit_type" value="top"> Верх (кофти, куртки)
            </label>
            <label class="opt-card">
                <input type="radio" name="outfit_type" value="bottom"> Низ (штани, взуття)
            </label>
        </div>
    </div>

    <button class="btn-gen" id="genBtn" onclick="startGeneration()">ЗГЕНЕРУВАТИ ОБРАЗ</button>

    <div id="result-area">
        <h3>Твій Look:</h3>
        <img id="res-img" class="ai-image" src="" alt="AI Look">
        <div class="info-box">
            <h4>Використані товари:</h4>
            <ul id="res-items"></ul>
            <hr>
            <p id="res-advice" style="font-style: italic;"></p>
        </div>
    </div>
</div>

<script>
    /* DOT GRID ANIMATION */
    const config = {
        dotSize: 4, gap: 20, baseColor: "#2F293A", activeColor: "#cdef2e",
        proximity: 120, speedTrigger: 100, returnDuration: 1.5
    };
    const canvas = document.getElementById('dotCanvas');
    const ctx = canvas.getContext('2d');
    let dots = [];
    let pointer = { x: -1000, y: -1000, lastX: 0, lastY: 0, lastTime: 0 };

    function buildGrid() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.scale(dpr, dpr);
        const cell = config.dotSize + config.gap;
        const cols = Math.ceil(window.innerWidth / cell) + 1;
        const rows = Math.ceil(window.innerHeight / cell) + 1;
        dots = [];
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                dots.push({ cx: x * cell, cy: y * cell, xOffset: 0, yOffset: 0 });
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        dots.forEach(dot => {
            const dx = dot.cx - pointer.x;
            const dy = dot.cy - pointer.y;
            const dsq = dx * dx + dy * dy;
            ctx.beginPath();
            ctx.arc(dot.cx + dot.xOffset, dot.cy + dot.yOffset, config.dotSize / 2, 0, Math.PI * 2);
            ctx.fillStyle = dsq < (config.proximity ** 2) ? config.activeColor : config.baseColor;
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }

    window.addEventListener('mousemove', (e) => {
        const now = performance.now();
        const curX = e.clientX, curY = e.clientY;
        pointer.x = curX; pointer.y = curY;
        const dt = now - pointer.lastTime || 16;
        const vx = ((curX - pointer.lastX) / dt) * 1000;
        const vy = ((curY - pointer.lastY) / dt) * 1000;
        if (Math.hypot(vx, vy) > config.speedTrigger) {
            dots.forEach(dot => {
                if (Math.hypot(dot.cx - curX, dot.cy - curY) < config.proximity) {
                    gsap.killTweensOf(dot);
                    gsap.to(dot, {
                        xOffset: (dot.cx - curX) * 0.4, yOffset: (dot.cy - curY) * 0.4,
                        duration: 0.3, onComplete: () => {
                            gsap.to(dot, { xOffset: 0, yOffset: 0, duration: config.returnDuration, ease: "elastic.out(1, 0.6)" });
                        }
                    });
                }
            });
        }
        pointer.lastX = curX; pointer.lastY = curY; pointer.lastTime = now;
    });

    window.addEventListener('resize', buildGrid);
    buildGrid(); draw();

    /* API GENERATION */
    async function startGeneration() {
        const btn = document.getElementById('genBtn');
        const h = document.getElementById('height').value;
        if(!h) return alert("Вкажіть зріст!");
        btn.innerText = "ШІ ДУМАЄ..."; btn.disabled = true;
        try {
            const res = await fetch('/api/generate-look', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    gender: document.getElementById('gender').value,
                    height: h, hair: document.getElementById('hair').value,
                    style: document.getElementById('style').value,
                    outfit_type: document.querySelector('input[name="outfit_type"]:checked').value
                })
            });
            const data = await res.json();
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('res-img').src = data.image_url || `https://image.pollinations.ai/prompt/${encodeURIComponent(data.visual_prompt)}?width=512&height=640&nologo=true`;
            document.getElementById('res-items').innerHTML = data.items?.map(i => `<li><b>${i}</b></li>`).join('') || "<li>Підбір товарів...</li>";
            document.getElementById('res-advice').innerText = data.advice || "";
        } catch (e) { alert("Помилка зв'язку."); }
        finally { btn.innerText = "ЗГЕНЕРУВАТИ ЩЕ РАЗ"; btn.disabled = false; }
    }
</script>
</body>
</html>
